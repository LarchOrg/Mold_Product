name: Deploy React App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🟢 Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      # 📦 Install dependencies (clean install)
      - name: Install dependencies
        run: npm ci

      # 🔧 Fix permission issue for Vite
      - name: Fix Vite permission
        run: chmod +x node_modules/.bin/vite

      # 🏗️ Build project
      - name: Build React App
        run: npm run build

      # 🐳 Docker login
      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🏗️ Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mouldprodfrontend:latest .

      # 📤 Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mouldprodfrontend:latest

      # 🚀 Deploy to server
      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/mouldprodfrontend:latest

            docker stop MouldProduct || true
            docker rm MouldProduct || true

            docker run -d \
              -p 127.0.0.1:8088:80 \
              --name MouldProduct \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/mouldprodfrontend:latest